# Nginx reverse proxy para o app Next.js (rodando via PM2 em 127.0.0.1:3000).
#
# Instalar:
#   sudo cp deploy/nginx-sfmadeiras.conf /etc/nginx/sites-available/sfmadeiras
#   sudo ln -s /etc/nginx/sites-available/sfmadeiras /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Sem domínio ainda: deixe `server_name _;` (responde em qualquer Host,
# inclusive acessando direto pelo IP da VPS). Quando tiver um domínio, troque
# `_` pelo domínio e rode `sudo certbot --nginx -d seu-dominio.com` para HTTPS
# automático (o certbot edita este arquivo pra adicionar o bloco de SSL).
#
# `default_server` é obrigatório aqui: esta VPS hospeda outros sites (ex:
# patriota-imoveis) e, sem a flag, o Nginx entrega requisições sem Host
# conhecido (como o acesso por IP) pro primeiro server block em ordem
# alfabética — o que já tirou este site do ar uma vez.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 10M; # comprovantes podem ter até 8MB (ver lib/upload.ts)

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
